<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ABSENSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-white transform -translate-x-full transition-transform duration-300 z-50">
        <div class="p-6">
            <h2 class="text-xl font-bold border-b border-slate-700 pb-4 mb-6 text-blue-400 italic">ABSENSI PRO</h2>
            <nav class="space-y-2 text-sm">
                <button onclick="showSection('dashboard')" class="w-full text-left flex items-center p-3 hover:bg-slate-800 rounded-xl transition">
                    <i class="fas fa-th-large mr-3 w-5"></i> Dashboard
                </button>
                <button onclick="showSection('karyawan')" class="w-full text-left flex items-center p-3 hover:bg-slate-800 rounded-xl transition">
                    <i class="fas fa-users mr-3 w-5"></i> Data Karyawan
                </button>
                <button onclick="showSection('cuti')" class="w-full text-left flex items-center p-3 hover:bg-slate-800 rounded-xl transition">
                    <i class="fas fa-calendar-check mr-3 w-5"></i> Jatah Cuti & Libur
                </button>
                <button onclick="showSection('pengaturan')" class="w-full text-left flex items-center p-3 hover:bg-slate-800 rounded-xl transition">
                    <i class="fas fa-shield-alt mr-3 w-5"></i> Keamanan Sandi
                </button>
                <hr class="border-slate-700 my-4">
                <button onclick="location.href='/login'" class="w-full text-left flex items-center p-3 text-red-400 hover:bg-slate-800 rounded-xl transition">
                    <i class="fas fa-sign-out-alt mr-3 w-5"></i> Keluar
                </button>
            </nav>
        </div>
    </div>

    <header class="bg-white border-b p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
        <button onclick="toggleSidebar()" class="bg-slate-100 p-2 rounded-lg text-slate-600">
            <i class="fas fa-bars text-xl"></i>
        </button>
        <h1 class="font-black text-slate-800 tracking-tighter text-xl">PANEL <span class="text-blue-600">ABSENSI</span></h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <section id="sec-dashboard" class="space-y-4">
            <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-lg">
                <p class="text-blue-100 text-xs uppercase font-bold tracking-widest mb-1">Status Hari Ini</p>
                <h2 class="text-2xl font-bold">Ringkasan Proyek</h2>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="bg-white/10 p-3 rounded-2xl">
                        <p class="text-[10px] opacity-70">HADIR</p>
                        <p class="text-xl font-bold" id="dash-hadir">0</p>
                    </div>
                    <div class="bg-white/10 p-3 rounded-2xl">
                        <p class="text-[10px] opacity-70">CUTI/LIBUR</p>
                        <p class="text-xl font-bold" id="dash-cuti">0</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-karyawan" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center"><i class="fas fa-user-plus mr-2 text-blue-500"></i> Tambah User</h3>
            <div class="flex gap-2 mb-6">
                <input id="new-name" type="text" placeholder="Nama Karyawan..." class="flex-1 bg-slate-50 border p-3 rounded-2xl text-sm outline-none focus:ring-2 ring-blue-500">
                <button onclick="addName()" class="bg-blue-600 text-white px-6 rounded-2xl font-bold hover:bg-blue-700 transition">+</button>
            </div>
            <div class="space-y-2" id="list-name">
                </div>
        </section>

        <section id="sec-cuti" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
            <i class="fas fa-calendar-alt text-4xl text-slate-200 mb-4"></i>
            <h3 class="font-bold text-slate-800 mb-2">Manajemen Cuti</h3>
            <p class="text-xs text-slate-400 mb-6">Fitur untuk mengatur jatah libur tahunan pengerja proyek.</p>
            <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-100 text-[10px] text-yellow-700 font-medium italic">
                Data cuti pengerja sedang disinkronkan...
            </div>
        </section>

    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function showSection(name) {
            const sections = ['dashboard', 'karyawan', 'cuti', 'pengaturan'];
            sections.forEach(s => {
                const el = document.getElementById('sec-' + s);
                if(el) el.classList.add('hidden');
            });
            document.getElementById('sec-' + name).classList.remove('hidden');
            toggleSidebar();
        }

        let data = JSON.parse(localStorage.getItem('pekerja')) || [];
        function addName() {
            const n = document.getElementById('new-name').value;
            if(n) {
                data.push(n);
                localStorage.setItem('pekerja', JSON.stringify(data));
                document.getElementById('new-name').value = '';
                render();
            }
        }

        function removeName(index) {
            data.splice(index, 1);
            localStorage.setItem('pekerja', JSON.stringify(data));
            render();
        }

        function render() {
            const list = document.getElementById('list-name');
            list.innerHTML = data.map((n, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <span class="text-sm font-medium text-slate-700 font-bold tracking-tight">${n}</span>
                    <button onclick="removeName(${i})" class="text-red-400 hover:text-red-600 p-2 text-xs">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
            document.getElementById('dash-hadir').innerText = data.length;
        }

        // Cek login sederhana
        if(sessionStorage.getItem('isAdmin') !== 'true') {
            window.location.href = '/login';
        }

        render();
    </script>
</body>
</html>

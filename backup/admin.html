
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ABSENSI PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen pb-20">
    <header class="bg-white border-b p-6 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <h1 class="font-black text-slate-800 tracking-tighter text-xl">PANEL <span class="text-blue-600">ADMIN</span></h1>
        <button onclick="location.reload()" class="bg-blue-50 p-2 rounded-lg text-blue-600"><i class="fas fa-sync-alt"></i></button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-list-check text-blue-600"></i> Rekap Absen Hari Ini</h3>
            <div class="overflow-hidden">
                <table class="w-full text-left text-[11px]">
                    <thead class="bg-slate-50 text-slate-400 uppercase font-black tracking-widest">
                        <tr><th class="p-2">Nama</th><th class="p-2">Waktu</th><th class="p-2">Status</th></tr>
                    </thead>
                    <tbody id="table-rekap" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-users-cog text-blue-600"></i> Daftar Pekerja</h3>
            <div class="flex gap-2 mb-4">
                <input id="new-name" type="text" placeholder="Nama baru..." class="flex-1 bg-slate-50 border p-3 rounded-2xl text-xs outline-none">
                <button onclick="addName()" class="bg-blue-600 text-white px-5 rounded-2xl font-bold">+</button>
            </div>
            <div id="list-name" class="space-y-2"></div>
        </div>
    </main>

    <script>
        // Cek Login
        if(sessionStorage.getItem('isAdmin') !== 'true') window.location.href = '/login.html';

        // Load Data Pekerja (Local)
        let dataP = JSON.parse(localStorage.getItem('pekerja')) || [];
        function renderP() {
            document.getElementById('list-name').innerHTML = dataP.map((n, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                    <span class="text-xs font-bold text-slate-600">${n}</span>
                    <button onclick="delP(${i})" class="text-red-400 text-xs px-2"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
            localStorage.setItem('pekerja', JSON.stringify(dataP));
        }
        function addName() {
            const n = document.getElementById('new-name').value;
            if(n) { dataP.push(n); document.getElementById('new-name').value = ''; renderP(); }
        }
        function delP(i) { dataP.splice(i,1); renderP(); }

        // AMBIL DATA DARI WORKER (SQL)
        async function fetchRekap() {
            try {
                const res = await fetch('https://absensi.chenpapoi.workers.dev/');
                const list = await res.json();
                document.getElementById('table-rekap').innerHTML = list.map(row => `
                    <tr>
                        <td class="p-2 font-bold">${row.nama}</td>
                        <td class="p-2 text-slate-400">${new Date(row.waktu).toLocaleTimeString('id-ID')}</td>
                        <td class="p-2 text-green-500 font-bold uppercase">${row.status}</td>
                    </tr>
                `).join('');
            } catch (e) { console.log('Rekap belum bisa diakses.'); }
        }

        renderP();
        fetchRekap();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sistem Absen Online</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --brand: #4f46e5;
            --brand-soft: #f5f7ff;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --emerald: #10b981;
            --rose: #f43f5e;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --sidebar-w: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--slate-50);
            color: var(--slate-800);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Login Barrier */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: var(--slate-50);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            border-radius: 2.5rem;
            text-align: center;
            border: 1px solid var(--slate-200);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.1);
        }

        input[type="password"] {
            width: 100%;
            padding: 1.25rem;
            border-radius: 1.25rem;
            border: 2px solid var(--slate-100);
            text-align: center;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            transition: .2s;
            outline: none;
        }

        input:focus {
            border-color: var(--brand);
            background: white;
        }

        /* Sidebar */
        aside {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-w);
            background: white;
            border-right: 1px solid var(--slate-200);
            display: flex;
            flex-direction: column;
            padding: 2.25rem;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 0.825rem;
            margin-bottom: 3.5rem;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: var(--brand);
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transform: rotate(3deg);
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--slate-900);
        }

        .logo-text span {
            color: var(--brand);
        }

        nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 1.1rem;
            border-radius: 1.1rem;
            color: var(--slate-400);
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.875rem;
        }

        .nav-item:hover {
            background: var(--slate-100);
        }

        .nav-item.active {
            background: var(--brand-soft);
            color: var(--brand);
        }

        /* Top Bar */
        .top-bar {
            position: sticky;
            top: 0;
            margin-left: var(--sidebar-w);
            height: 80px;
            background: rgba(255, 255, 255, 0.85);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--slate-200);
            z-index: 900;
            display: flex;
            align-items: center;
            padding: 0 3rem;
            justify-content: space-between;
        }

        /* Responsive Mobile */
        .hamburger {
            display: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: var(--slate-100);
            color: var(--slate-800);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 1100;
        }

        @media (max-width: 1024px) {
            aside {
                transform: translateX(-100%);
            }

            aside.open {
                transform: translateX(0);
            }

            .top-bar {
                margin-left: 0;
                padding-left: 5rem;
            }

            main {
                margin-left: 0 !important;
                padding: 1.5rem !important;
            }

            .hamburger {
                display: flex;
            }
        }

        main {
            margin-left: var(--sidebar-w);
            padding: 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            transition: margin 0.3s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: white;
            border: 1.5px solid var(--slate-200);
            border-radius: 2rem;
            padding: 1.75rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .table-card {
            background: white;
            border: 1.5px solid var(--slate-200);
            border-radius: 2rem;
            overflow: hidden;
        }

        .table-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--slate-100);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            padding: 1rem 2rem;
            text-align: left;
            font-size: 0.625rem;
            font-weight: 900;
            color: var(--slate-400);
            background: var(--slate-50);
            text-transform: uppercase;
        }

        td {
            padding: 1rem 2rem;
            border-top: 1px solid var(--slate-100);
            font-size: 0.8125rem;
            font-weight: 700;
        }

        .btn {
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            font-weight: 800;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: .2s;
        }

        .btn-brand {
            background: var(--brand);
            color: white;
        }

        .btn-soft {
            background: var(--slate-100);
            color: var(--slate-600);
        }

        .view-section {
            display: none;
            flex-direction: column;
            gap: 2rem;
        }

        .view-section.active {
            display: flex;
            animation: viewIn 0.4s;
        }

        @keyframes viewIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <button class="hamburger hidden" id="menu-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>

    <div id="login-screen" class="login-overlay">
        <div class="login-card">
            <h2 style="font-weight: 900;">Admin Login</h2>
            <p style="font-size: 0.8rem; color: var(--slate-400); margin-bottom: 1.5rem;">Akses Sistem Absen Online</p>
            <input type="password" id="login-pass" placeholder="Password Sistem">
            <button onclick="auth()" class="btn btn-brand" style="width: 100%; justify-content: center;">Masuk Ke
                Server</button>
        </div>
    </div>

    <aside id="sidebar" class="hidden">
        <div class="logo-box">
            <div class="logo-icon"><i data-lucide="shield-check" style="width: 20px;"></i></div>
            <h1 class="logo-text">System<span>Absen</span></h1>
        </div>
        <nav>
            <button onclick="switchView('dashboard')" class="nav-item active" id="nav-dashboard"><i
                    data-lucide="layout-grid"></i> Dashboard</button>
            <button onclick="switchView('employees')" class="nav-item" id="nav-employees"><i data-lucide="users"></i>
                Pegawai</button>
            <button onclick="switchView('history')" class="nav-item" id="nav-history"><i data-lucide="book-copy"></i>
                Log Absensi</button>
            <button onclick="location.reload()" class="btn-soft"
                style="margin-top: auto; border-radius: 1rem; color: var(--rose);"><i data-lucide="log-out"></i> Keluar
                Admin</button>
        </nav>
    </aside>

    <div id="main-ui" class="hidden">
        <div class="top-bar">
            <h2 id="top-title" style="font-size: 1.125rem; font-weight: 900;">Pengaturan Sistem</h2>
            <div
                style="font-size: 0.625rem; font-weight: 900; color: var(--brand); padding: 0.5rem 1rem; border-radius: 1rem; background: var(--brand-soft);">
                STATUS: TERHUBUNG ✅</div>
        </div>

        <main>
            <div class="stats-grid">
                <div class="stat-card">
                    <div>
                        <p
                            style="font-size: 10px; font-weight: 800; color: var(--slate-400); text-transform: uppercase;">
                            Total Staf</p>
                        <h4 id="stat-total" style="font-size: 2rem;">--</h4>
                    </div>
                </div>
                <div class="stat-card">
                    <div>
                        <p
                            style="font-size: 10px; font-weight: 800; color: var(--slate-400); text-transform: uppercase;">
                            Absensi Hari Ini</p>
                        <h4 id="stat-present" style="font-size: 2rem;">--</h4>
                    </div>
                </div>
            </div>

            <div id="view-dashboard" class="view-section active">
                <div class="table-card">
                    <div class="table-header">
                        <h3>Absensi Terakhir (Real-Time)</h3>
                    </div>
                    <div class="table-wrap">
                        <table id="table-logs">
                            <thead>
                                <tr>
                                    <th>Nama</th>
                                    <th>Waktu</th>
                                    <th>Lokasi</th>
                                    <th>Geofence</th>
                                </tr>
                            </thead>
                            <tbody id="logs-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="view-employees" class="view-section">
                <div class="table-card">
                    <div class="table-header">
                        <h3>Data Pegawai</h3>
                    </div>
                    <div class="table-wrap">
                        <table id="table-emps">
                            <thead>
                                <tr>
                                    <th>Nama</th>
                                    <th>Divisi</th>
                                    <th>Gaji</th>
                                    <th>Shift</th>
                                </tr>
                            </thead>
                            <tbody id="emps-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="view-history" class="view-section">
                <div class="table-card">
                    <div class="table-header">
                        <h3>Arsip Riwayat Lengkap</h3>
                    </div>
                    <div class="table-wrap">
                        <table id="table-history">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Tanggal Jam</th>
                                    <th>Koordinat</th>
                                </tr>
                            </thead>
                            <tbody id="history-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'https://absensi.chenpapoi.workers.dev/api';
        let store = { users: [], logs: [] };

        function auth() {
            if (document.getElementById('login-pass').value === 'dr.bofoi1212') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('menu-toggle').classList.remove('hidden');
                lucide.createIcons();
                fetchData();
            } else { alert('Goresan Sandi Salah'); }
        }

        async function fetchData() {
            try {
                const [u, l] = await Promise.all([fetch(`${API_URL}/users`), fetch(`${API_URL}/absensi`)]);
                store.users = await u.json();
                store.logs = await l.json();
                render();
            } catch (e) { console.log("Host Offline"); }
        }

        function render() {
            const pegs = store.users.filter(u => u.role === 'pegawai');
            document.getElementById('stat-total').innerText = pegs.length;
            document.getElementById('stat-present').innerText = store.logs.length;
            document.getElementById('logs-body').innerHTML = store.logs.slice(0, 10).map(i => `<tr><td>${i.nama}</td><td>${new Date(i.waktu).toLocaleString()}</td><td>${i.lokasi}</td><td><span style="color:var(--emerald);">Verifikasi OK</span></td></tr>`).join('');
            document.getElementById('emps-body').innerHTML = pegs.map(u => `<tr><td>${u.nama}</td><td><span style="color:var(--brand);">${u.dept}</span></td><td>Rp ${u.base_salary.toLocaleString()}</td><td>${u.schedule}</td></tr>`).join('');
            document.getElementById('history-body').innerHTML = store.logs.map(i => `<tr><td>${i.nama}</td><td>${i.waktu}</td><td>${i.lokasi}</td></tr>`).join('');
            lucide.createIcons();
        }

        function switchView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-' + v).classList.add('active');
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        document.getElementById('login-pass').addEventListener('keypress', (e) => { if (e.key === 'Enter') auth(); });
    </script>
</body>

</html>

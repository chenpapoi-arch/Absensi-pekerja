<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudAbsen Pro - Portal Masuk</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --brand: #4f46e5;
            --brand-dark: #4338ca;
            --slate-50: #f8fafc;
            --slate-400: #94a3b8;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: radial-gradient(circle at top right, #eef2ff, #f8fafc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--slate-800);
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 2.5rem;
            padding: 3.5rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-box {
            width: 80px;
            height: 80px;
            background: var(--brand);
            color: white;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.3);
            transform: rotate(3deg);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            color: var(--slate-900);
        }

        h1 span {
            color: var(--brand);
        }

        p.subtitle {
            color: var(--slate-400);
            font-size: 0.875rem;
            font-weight: 500;
            font-style: italic;
            margin-bottom: 3rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1.25rem;
            border-radius: 1.25rem;
            font-weight: 700;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            width: 100%;
        }

        .btn-primary {
            background: var(--brand);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
        }

        .btn-primary:hover {
            background: var(--brand-dark);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.3);
        }

        .btn-outline {
            background: white;
            color: var(--slate-800);
            border-color: #e2e8f0;
        }

        .btn-outline:hover {
            border-color: var(--brand);
            color: var(--brand);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Modal Login Admin */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 360px;
            padding: 2.5rem;
            border-radius: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        input {
            width: 100%;
            padding: 1.25rem;
            border-radius: 1.25rem;
            border: 1.5px solid #e2e8f0;
            margin-bottom: 1.5rem;
            outline: none;
            transition: 0.2s;
            font-weight: 600;
            text-align: center;
        }

        input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px #eef2ff;
        }

        .footer {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid #f1f5f9;
            font-size: 0.625rem;
            font-weight: 800;
            color: var(--slate-400);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo-box">
            <i data-lucide="shield-check" style="width: 32px; height: 32px;"></i>
        </div>

        <h1>CloudAbsen <span>Pro</span></h1>
        <p class="subtitle">Sistem Kehadiran Terpadu & Realtime</p>

        <div class="btn-group">
            <button onclick="openAdmin()" class="btn btn-primary">
                <i data-lucide="lock" style="width: 20px; height: 20px;"></i> Portal Administrasi
            </button>
            <button onclick="window.location.href='absensi.html'" class="btn btn-outline">
                <i data-lucide="user-check" style="width: 20px; height: 20px;"></i> Portal Karyawan
            </button>
        </div>

        <div class="footer">Cloudflare D1 Infrastructure</div>
    </div>

    <!-- MODAL ADMIN -->
    <div id="modal-admin" class="modal">
        <div class="modal-content">
            <h3 style="font-weight: 800; margin-bottom: 0.5rem;">Akses Admin</h3>
            <p style="font-size: 0.8125rem; color: var(--slate-400); margin-bottom: 2rem;">Silakan masukkan kata sandi
                Anda.</p>
            <input type="password" id="admin-pass" placeholder="••••••••">
            <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                <button onclick="checkAdmin()" class="btn btn-primary" style="padding: 1rem;">Masuk</button>
                <button onclick="document.getElementById('modal-admin').classList.remove('active')"
                    class="btn btn-outline" style="padding: 1rem; border: none; color: var(--slate-400);">Batal</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function openAdmin() { document.getElementById('modal-admin').classList.add('active'); document.getElementById('admin-pass').focus(); }
        function checkAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'dr.bofoi1212') {
                localStorage.setItem('role', 'admin');
                window.location.href = 'admin.html';
            } else {
                alert('Sandi Salah');
            }
        }
        document.getElementById('admin-pass').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAdmin(); });
    </script>

</body>

</html>

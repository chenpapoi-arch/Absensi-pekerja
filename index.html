<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudAbsen Pro - Portal Masuk</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-50 to-indigo-50">

    <div class="max-w-md w-full glass p-10 rounded-[3rem] shadow-2xl space-y-10 scale-in">
        <div class="text-center space-y-4">
            <div
                class="w-16 h-16 bg-indigo-600 rounded-3xl flex items-center justify-center text-white mx-auto shadow-2xl rotate-3">
                <i data-lucide="shield-check" class="w-8 h-8"></i>
            </div>
            <div class="space-y-1">
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">CloudAbsen <span
                        class="text-indigo-600">Pro</span></h1>
                <p class="text-slate-400 text-sm font-medium italic">Sistem Kehadiran Terpadu & Realtime</p>
            </div>
        </div>

        <div class="space-y-4">
            <button onclick="navigate('admin')"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-indigo-100 transition-all flex items-center justify-center gap-3 active:scale-95">
                <i data-lucide="lock" class="w-5 h-5"></i> Masuk Melalui Portal Admin
            </button>
            <button onclick="navigate('absensi')"
                class="w-full bg-white border-2 border-slate-100 hover:border-indigo-200 text-slate-600 font-bold py-5 rounded-2xl transition-all flex items-center justify-center gap-3 active:scale-95 shadow-sm">
                <i data-lucide="user" class="w-5 h-5"></i> Masuk Melalui Portal Karyawan
            </button>
        </div>

        <div class="pt-6 border-t border-slate-100 text-center">
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">Built for Cloudflare
                Infrastructure</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function navigate(page) {
            localStorage.setItem('user_role', page);
            window.location.href = page + '.html';
        }
    </script>

</body>

</html>

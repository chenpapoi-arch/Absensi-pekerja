<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Karyawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl border-t-[10px] border-blue-600 p-8 text-center">
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter mb-2">ABSENSI <span class="text-blue-600">PRO</span></h1>
        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-8">Sistem Presensi Proyek</p>

        <div class="space-y-4">
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-left">
                <label class="text-[10px] font-black text-blue-600 uppercase">Pilih Nama Anda:</label>
                <select id="user-select" class="w-full bg-transparent font-bold text-slate-700 outline-none mt-1">
                    </select>
            </div>

            <button onclick="doAbsen()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition tracking-wider">
                KIRIM ABSEN SEKARANG
            </button>
        </div>

        <div class="mt-10 pt-6 border-t border-slate-50 flex justify-between items-center">
            <p class="text-[10px] text-slate-300 font-bold uppercase">© 2026 Proyek</p>
            <a href="/login" class="text-xs text-blue-500 font-bold bg-blue-50 px-3 py-1 rounded-full">Admin Panel</a>
        </div>
    </div>

    <script>
        const data = JSON.parse(localStorage.getItem('pekerja')) || ['Dedi (Welder)', 'Sopian (Field)'];
        const select = document.getElementById('user-select');
        select.innerHTML = data.map(n => `<option>${n}</option>`).join('');

        function doAbsen() {
            alert('Berhasil! Lokasi Anda telah tercatat.');
        }
    </script>
</body>
</html>

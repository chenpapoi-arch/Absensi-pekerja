<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudAbsen - Modern Attendance System</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg-dark: #070b14;
            --card-bg: rgba(255, 255, 255, 0.03);
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: #0f172a;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .neo-btn {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neo-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #334155;
        }

        .scanner-frame {
            position: relative;
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 2rem;
            overflow: hidden;
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #6366f1;
            box-shadow: 0 0 20px #6366f1;
            animation: scan-move 2.5s ease-in-out infinite;
            z-index: 10;
            display: none;
        }

        @keyframes scan-move {
            0%, 100% { top: 0%; transform: scaleX(0.9); }
            50% { top: 100%; transform: scaleX(1.1); }
        }

        #map-container { height: 200px; border-radius: 1.5rem; z-index: 1; }

        .blob {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            filter: blur(60px); z-index: -1; opacity: 0.5;
        }

        .step-hidden { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="blob top-0 -left-20 bg-indigo-500"></div>
        <div class="blob bottom-0 -right-20 bg-purple-500"></div>

        <!-- LOGIN -->
        <div id="login-screen" class="min-h-screen flex flex-col p-8 items-center justify-center">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl mb-6 transform rotate-6">
                <i data-lucide="shield-check" class="text-white"></i>
            </div>
            <h1 class="text-3xl font-black text-white mb-8 tracking-tighter uppercase">ABSENSI <span class="text-indigo-400">PRO</span></h1>
            
            <div class="w-full space-y-3">
                <button onclick="switchView('employee')" class="w-full glass p-5 rounded-3xl flex items-center gap-4 hover:bg-white/5 transition-all text-left group">
                    <div class="w-12 h-12 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 group-hover:bg-indigo-500 group-hover:text-white transition-all"><i data-lucide="user"></i></div>
                    <div><p class="font-bold text-white">Pegawai</p><p class="text-[10px] text-gray-500">Presensi wajah & lokasi</p></div>
                </button>
                <button onclick="switchView('admin')" class="w-full glass p-5 rounded-3xl flex items-center gap-4 hover:bg-white/5 transition-all text-left group">
                    <div class="w-12 h-12 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-400 group-hover:bg-purple-500 group-hover:text-white transition-all"><i data-lucide="lock"></i></div>
                    <div><p class="font-bold text-white">Administrator</p><p class="text-[10px] text-gray-500">Kelola data & laporan</p></div>
                </button>
            </div>
        </div>

        <!-- EMPLOYEE -->
        <div id="employee-screen" class="step-hidden min-h-screen pb-24">
            <header class="p-6 flex items-center justify-between">
                <h2 id="welcome-text" class="text-xl font-bold text-white">Halo!</h2>
                <button onclick="logout()" class="p-3 rounded-2xl glass text-gray-400 hover:text-white"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </header>

            <main class="px-6 space-y-6">
                <div class="glass p-6 rounded-[2.5rem] space-y-6 border-indigo-500/30">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-500 uppercase ml-2">Pilih Nama Pekerja</label>
                        <select id="user-select" onchange="updateProfile()" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl font-bold text-white outline-none focus:border-indigo-500 appearance-none"></select>
                    </div>

                    <div class="scanner-frame aspect-square bg-slate-900 flex items-center justify-center relative overflow-hidden group">
                        <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=600&auto=format&fit=crop" class="w-full h-full object-cover grayscale opacity-20 group-hover:scale-110 transition-transform duration-[5s]" />
                        <div id="scanner-line" class="scanner-line"></div>
                        <div id="scan-state-idle" class="absolute inset-0 flex items-center justify-center z-20">
                            <button onclick="startScanning()" class="w-16 h-16 rounded-full bg-indigo-600/20 backdrop-blur-xl border border-white/20 flex items-center justify-center text-white shadow-2xl hover:scale-110 transition-all"><i data-lucide="camera"></i></button>
                        </div>
                        <div id="scan-state-success" class="absolute inset-0 flex items-center justify-center z-30 bg-emerald-600/90 scale-0 transition-transform duration-500"><div class="bg-white rounded-full p-3"><i data-lucide="check" class="text-emerald-600"></i></div></div>
                    </div>

                    <div id="map-container" class="glass"></div>

                    <p id="coords-text" class="text-[10px] text-center text-gray-500 font-mono">GPS: SIAP MEMINDAI...</p>

                    <button id="btn-absen" onclick="submitAttendance()" disabled class="w-full neo-btn py-5 rounded-2xl text-white font-black flex items-center justify-center gap-3">KIRIM PRESENSI <i data-lucide="send" class="w-4 h-4"></i></button>
                </div>
            </main>
        </div>

        <!-- ADMIN -->
        <div id="admin-screen" class="step-hidden min-h-screen">
            <header class="p-6 flex items-center justify-between sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
                <h1 class="text-xl font-black text-white">REKAP <span class="text-indigo-400">ABSEN</span></h1>
                <button onclick="logout()" class="p-3 rounded-2xl glass text-gray-400"><i data-lucide="log-out"></i></button>
            </header>

            <main class="px-6 space-y-6 mt-4 pb-20">
                <div class="glass rounded-[2rem] overflow-hidden">
                    <div class="p-4 bg-white/5 flex justify-between border-b border-white/5"><span class="text-[10px] font-bold text-gray-500 uppercase">Aktivitas Pekerja</span><button onclick="fetchRekap()" class="text-indigo-400"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button></div>
                    <div id="table-rekap" class="divide-y divide-white/5">
                        <div class="p-4 text-center text-xs text-gray-600">Memuat data...</div>
                    </div>
                </div>

                <div class="glass p-6 rounded-[2rem] space-y-4">
                    <h4 class="font-bold text-white flex items-center gap-2"><i data-lucide="users-cog" class="w-4 h-4 text-indigo-400"></i> Kelola Pekerja</h4>
                    <div class="flex gap-2">
                        <input id="new-name" type="text" placeholder="Nama Baru..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-xl text-xs text-white outline-none">
                        <button onclick="addName()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold">+</button>
                    </div>
                    <div id="list-name" class="space-y-2"></div>
                </div>

                <button onclick="deleteOldData()" class="w-full border border-rose-500/20 py-4 rounded-2xl text-rose-500 text-xs font-black uppercase tracking-widest hover:bg-rose-500/5 transition-all">Clear Data > 1 Year</button>
            </main>
        </div>
    </div>

    <script>
        const API_URL = 'https://absensi.chenpapoi.workers.dev/';
        let map, userCoords = null;

        function initApp() {
            lucide.createIcons();
            loadPekerja();
        }

        function loadPekerja() {
            const data = JSON.parse(localStorage.getItem('pekerja')) || ['Dedi (Welder)', 'Sopian (Field)'];
            const select = document.getElementById('user-select');
            select.innerHTML = data.map(n => `<option value="${n}">${n}</option>`).join('');
            
            const listName = document.getElementById('list-name');
            listName.innerHTML = data.map((n, i) => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                    <span class="text-xs font-bold text-gray-300 font-bold">${n}</span>
                    <button onclick="delP(${i})" class="text-rose-400"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
            localStorage.setItem('pekerja', JSON.stringify(data));
        }

        function switchView(view) {
            document.querySelectorAll('#app-container > div:not(.blob)').forEach(d => d.classList.add('step-hidden'));
            document.getElementById(view + '-screen').classList.remove('step-hidden');
            if(view === 'employee') {
                setTimeout(initMap, 500);
            } else if(view === 'admin') {
                fetchRekap();
            }
        }

        function logout() { switchView('login'); }

        function initMap() {
            if(map) return;
            map = L.map('map-container', { zoomControl: false }).setView([-6.2088, 106.8456], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userCoords = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                    document.getElementById('coords-text').innerText = 'GPS LOCKED: ' + userCoords;
                    const markerIcon = L.divIcon({ className:'m', html:'<div class="w-4 h-4 bg-indigo-500 rounded-full border-2 border-white shadow-lg animate-ping"></div>'});
                    L.marker([pos.coords.latitude, pos.coords.longitude], {icon:markerIcon}).addTo(map);
                    map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                });
            }
        }

        function startScanning() {
            document.getElementById('scan-state-idle').style.display = 'none';
            document.getElementById('scanner-line').style.display = 'block';
            setTimeout(() => {
                document.getElementById('scanner-line').style.display = 'none';
                document.getElementById('scan-state-success').style.transform = 'scale(1)';
                document.getElementById('btn-absen').disabled = false;
            }, 2500);
        }

        async function submitAttendance() {
            const nama = document.getElementById('user-select').value;
            const btn = document.getElementById('btn-absen');
            btn.disabled = true;
            btn.innerHTML = 'MENGIRIM...';
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nama: nama, lokasi: userCoords || "0,0" })
                });
                alert('ABSENSI BERHASIL DISIMPAN!');
                logout();
                location.reload();
            } catch (e) { alert('Gagal terhubung ke Cloudflare!'); btn.disabled = false; btn.innerHTML = 'KIRIM PRESENSI'; }
        }

        async function fetchRekap() {
            const container = document.getElementById('table-rekap');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                container.innerHTML = data.length ? data.map(r => `
                    <div class="p-4 flex justify-between items-center group">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-indigo-500/10 flex items-center justify-center text-[10px] font-black text-indigo-400">${r.nama[0]}</div>
                            <div><p class="text-xs font-bold text-gray-200">${r.nama}</p><p class="text-[9px] text-gray-500 uppercase">${new Date(r.waktu).toLocaleString('id-ID')}</p></div>
                        </div>
                        <div class="text-right text-[10px] font-black text-emerald-400 uppercase">${r.status || 'Verified'}</div>
                    </div>
                `).join('') : '<div class="p-8 text-center text-xs text-gray-600">Belum ada data masuk.</div>';
            } catch (e) { container.innerHTML = '<div class="p-8 text-center text-xs text-rose-500">Error: Gagal memuat data D1.</div>'; }
        }

        function addName() {
            const n = document.getElementById('new-name').value;
            if(n) {
                const data = JSON.parse(localStorage.getItem('pekerja')) || [];
                data.push(n);
                localStorage.setItem('pekerja', JSON.stringify(data));
                document.getElementById('new-name').value = '';
                loadPekerja();
            }
        }
        function delP(i) {
            const data = JSON.parse(localStorage.getItem('pekerja'));
            data.splice(i,1);
            localStorage.setItem('pekerja', JSON.stringify(data));
            loadPekerja();
        }
        function deleteOldData() { if(confirm("Hapus data lebih dari 1 tahun?")) alert("Fitur Sinkron D1 DB Aktif."); }

        initApp();
    </script>
</body>
</html>

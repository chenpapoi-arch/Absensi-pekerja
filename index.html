<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absen Online - Portal Karyawan</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --brand: #4f46e5;
            --brand-dark: #4338ca;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --emerald: #10b981;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background: var(--slate-50);
            color: var(--slate-800);
            min-height: 100vh;
            padding: 1.5rem;
            padding-bottom: 7rem;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--slate-200);
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--slate-900);
        }

        .logo-text span {
            color: var(--brand);
            font-style: italic;
            font-size: 1.35rem;
        }

        .card {
            background: white;
            border: 1.5px solid var(--slate-200);
            border-radius: 2rem;
            padding: 1.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .card-header {
            font-size: 0.625rem;
            font-weight: 800;
            color: var(--slate-400);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        select {
            width: 100%;
            padding: 1.25rem;
            border-radius: 1.25rem;
            border: 1.5px solid var(--slate-200);
            background: white;
            font-weight: 700;
            color: var(--slate-800);
            font-size: 0.9375rem;
            outline: none;
            appearance: none;
            transition: 0.3s;
        }

        select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px #eef2ff;
        }

        /* Face Scanner */
        .scanner-frame {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border-radius: 2rem;
            overflow: hidden;
            border: 8px solid white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        #cam-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--brand), transparent);
            box-shadow: 0 0 20px var(--brand);
            animation: scan-v 3s linear infinite;
            display: none;
            z-index: 20;
        }

        @keyframes scan-v {
            0% {
                top: 10%;
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                top: 90%;
                opacity: 0;
            }
        }

        .scanning-ui {
            position: absolute;
            inset: 0;
            border: 4px solid var(--brand);
            animation: pulse 2s infinite;
            border-radius: 2rem;
            display: none;
        }

        @keyframes pulse {
            0% {
                opacity: 0.2;
                transform: scale(0.98);
            }

            50% {
                opacity: 0.5;
                transform: scale(1);
            }

            100% {
                opacity: 0.2;
                transform: scale(0.98);
            }
        }

        .verified-badge {
            position: absolute;
            inset: 0;
            background: var(--emerald);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: white;
            z-index: 50;
        }

        #map-box {
            height: 260px;
            width: 100%;
            border-radius: 1.5rem;
            border: 1.5px solid var(--slate-200);
        }

        .btn {
            width: 100%;
            padding: 1.125rem;
            border-radius: 1.5rem;
            font-weight: 800;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--brand);
            color: white;
        }

        .btn-primary:disabled {
            background: var(--slate-200);
            color: var(--slate-400);
            cursor: not-allowed;
        }

        .btn-logout {
            background: #fff1f2;
            color: #ef4444;
            margin-top: 1rem;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Bottom Nav */
        nav.bottom-tabs {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.85);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 0.75rem;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 100;
        }

        .tab {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--slate-400);
            cursor: pointer;
        }

        .tab.active {
            background: #eef2ff;
            color: var(--brand);
        }

        .tab-main {
            width: 64px;
            height: 64px;
            background: var(--brand);
            color: white;
            margin-top: -3rem;
            border: 5px solid var(--slate-50);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .view {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            animation: viewIn 0.4s ease-out;
        }

        .view.active {
            display: flex;
        }

        @keyframes viewIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            font-size: 0.625rem;
            font-weight: 800;
            padding: 0.25rem 0.625rem;
            border-radius: 0.5rem;
            text-transform: uppercase;
        }

        .badge-brand {
            background: #eef2ff;
            color: var(--brand);
        }

        .badge-emerald {
            background: #ecfdf5;
            color: var(--emerald);
        }

        .salary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--slate-100);
        }

        .salary-row span:first-child {
            color: var(--slate-400);
            font-weight: 600;
            font-size: 0.8125rem;
        }

        .salary-row span:last-child {
            font-weight: 800;
            font-size: 0.8125rem;
        }

        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 1.125rem;
            border-radius: 1.125rem;
            border: 1.5px solid var(--slate-200);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px #eef2ff;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <div class="logo-text">Sistem <span>Absen Online</span></div>
            <div id="sync-pill" class="badge badge-brand">Sistem Aktif ✅</div>
        </header>

        <div id="view-scan" class="view active">
            <div class="card">
                <div class="card-header">
                    <span>Pemilihan Pegawai</span>
                    <i data-lucide="user-check" style="width: 14px;"></i>
                </div>
                <select id="user-select">
                    <option disabled selected>Memuat data pegawai...</option>
                </select>
            </div>

            <div class="scanner-frame">
                <video id="cam-video" autoplay playsinline></video>
                <div id="scan-line" class="scanner-line"></div>
                <div id="scan-pulse" class="scanning-ui"></div>

                <div id="scan-verify" class="verified-badge">
                    <i data-lucide="check-circle-2" style="width: 64px; height: 64px;"></i>
                    <h3 style="font-weight: 800; letter-spacing: 0.2em;">TERVERIFIKASI</h3>
                </div>

                <div style="position: absolute; bottom: 2rem; left: 0; right: 0; text-align: center; z-index: 30;">
                    <button onclick="startScan()" id="btn-start" class="btn btn-primary"
                        style="width: auto; padding: 1rem 2rem; border-radius: 3rem; margin: 0 auto; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">Mulai
                        Scan Wajah</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span>Lokasi Saya</span></div>
                <div id="map-box"></div>
            </div>

            <button id="btn-submit" onclick="submitAbsen()" class="btn btn-primary" disabled>
                KLIK UNTUK MASUK (IN) <i data-lucide="arrow-right-circle"></i>
            </button>
        </div>

        <div id="view-info" class="view">
            <div class="card">
                <div class="card-header"><span>Jadwal & Gaji</span></div>
                <div id="schedule-list">
                    <div class="salary-row"><span>Status</span><span class="badge badge-emerald">Aktif</span></div>
                    <div class="salary-row"><span>Jam Kerja</span><span id="sch-string">08:00 - 17:00</span></div>
                    <div class="salary-row"><span>Total Gaji</span><span id="salary-total"
                            style="color: var(--brand); font-weight: 900;">Rp --</span></div>
                </div>
            </div>
            <button onclick="window.close()" class="btn btn-logout">Tutup / Keluar Aplikasi <i
                    data-lucide="log-out"></i></button>
        </div>

        <div id="view-leave" class="view">
            <div class="card">
                <div class="card-header"><span>Status Cuti Tahunan</span></div>
                <h4 id="leave-available" style="font-size: 2rem; font-weight: 900;">--/12</h4>
                <p style="font-size: 0.75rem; color: var(--slate-400);">Sisa Hari Cuti Anda</p>
            </div>

            <div class="card">
                <div class="card-header"><span>Pengajuan Izin / Cuti</span></div>
                <form id="leave-form" onsubmit="event.preventDefault(); submitLeave();"
                    style="display: flex; flex-direction: column; gap: 1rem;">
                    <select id="leave-type" required>
                        <option value="" disabled selected>Pilih Alasan Izin</option>
                        <option value="Sakit">Sakit</option>
                        <option value="Cuti">Cuti Tahunan</option>
                    </select>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <input type="date" id="leave-start" required>
                        <input type="date" id="leave-end" required>
                    </div>
                    <textarea id="leave-reason" placeholder="Keterangan..." style="min-height: 80px;"></textarea>
                    <button type="submit" class="btn btn-primary">Kirim Pengajuan</button>
                </form>
            </div>
        </div>
    </div>

    <nav class="bottom-tabs">
        <div onclick="switchView('scan')" id="tab-scan" class="tab active"><i data-lucide="camera"
                style="width: 20px;"></i></div>
        <div onclick="switchView('info')" id="tab-info" class="tab"><i data-lucide="wallet" style="width: 20px;"></i>
        </div>
        <div onclick="switchView('scan')" class="tab tab-main"><i data-lucide="fingerprint" style="width: 28px;"></i>
        </div>
        <div onclick="switchView('leave')" id="tab-leave" class="tab"><i data-lucide="calendar-days"
                style="width: 20px;"></i></div>
    </nav>

    <script>
        const API_URL = 'https://absensi.chenpapoi.workers.dev/api';
        let mapV2, userPos = null;
        let currentUserData = null;

        async function init() {
            lucide.createIcons();
            fetchEmployees();
            initMap();
            requestCamera();
        }

        async function fetchEmployees() {
            const sel = document.getElementById('user-select');
            try {
                const res = await fetch(`${API_URL}/users`);
                const data = await res.json();
                const emps = data.filter(u => u.role === 'pegawai');
                sel.innerHTML = emps.map(u => `<option value="${u.id}" data-all='${JSON.stringify(u)}'>${u.nama} (${u.dept})</option>`).join('');
                updateUserInfo();
            } catch (e) { sel.innerHTML = '<option disabled>Koneksi Gagal</option>'; }
        }

        document.getElementById('user-select').addEventListener('change', updateUserInfo);

        function updateUserInfo() {
            const opt = document.getElementById('user-select').selectedOptions[0];
            if (!opt) return;
            const u = JSON.parse(opt.getAttribute('data-all'));
            currentUserData = u;
            document.getElementById('salary-total').innerText = `Rp ${(u.base_salary + u.food_allowance).toLocaleString()}`;
            document.getElementById('leave-available').innerText = `${u.leave_total - u.leave_used}/${u.leave_total}`;
            document.getElementById('sch-string').innerText = u.schedule || '08:00 - 17:00';
        }

        function initMap() {
            mapV2 = L.map('map-box', { zoomControl: false }).setView([-6.2088, 106.8456], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mapV2);
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userPos = `${pos.coords.latitude.toFixed(6)},${pos.coords.longitude.toFixed(6)}`;
                    const marker = L.divIcon({ className: 'm', html: '<div style="width:14px; height:14px; background:var(--brand); border:3px solid white; border-radius:50%; box-shadow:0 0 10px rgba(0,0,0,0.2);"></div>' });
                    L.marker([pos.coords.latitude, pos.coords.longitude], { icon: marker }).addTo(mapV2);
                    mapV2.setView([pos.coords.latitude, pos.coords.longitude], 17);
                }, () => console.log("GPS Off"));
            }
        }

        async function requestCamera() {
            const video = document.getElementById('cam-video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (e) { console.log("Cam Off"); }
        }

        function startScan() {
            const line = document.getElementById('scan-line');
            const pulse = document.getElementById('scan-pulse');
            line.style.display = 'block';
            pulse.style.display = 'block';
            document.getElementById('btn-start').style.opacity = '0.3';
            setTimeout(() => {
                line.style.display = 'none';
                pulse.style.display = 'none';
                document.getElementById('scan-verify').style.display = 'flex';
                document.getElementById('btn-submit').disabled = false;
            }, 3000);
        }

        async function submitAbsen() {
            if (!currentUserData) return;
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = 'MENGIRIM...';
            const payload = { user_id: currentUserData.id, nama: currentUserData.nama, type: 'IN', lokasi: userPos || 'Office', status: 'Verified' };
            try {
                const res = await fetch(`${API_URL}/absensi`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) { alert('Berhasil!'); location.reload(); }
            } catch (e) { alert('Error'); }
        }

        function switchView(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${v}`).classList.add('active');
        }

        init();
    </script>
</body>

</html>

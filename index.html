<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABSENSI PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans">
    <header class="bg-blue-600 pt-10 pb-20 px-6 rounded-b-[3rem] shadow-lg text-white">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">ABSENSI <span class="text-blue-200">PRO</span></h1>
                <p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest">Management 2026</p>
            </div>
            <a href="/login.html" class="bg-white/20 p-3 rounded-2xl backdrop-blur-md"><i class="fas fa-user-shield"></i></a>
        </div>
    </header>
    <main class="flex-1 px-6 -mt-12">
        <div class="bg-white rounded-[2.5rem] shadow-xl p-8 space-y-8">
            <div class="text-center">
                <div class="inline-block bg-green-100 text-green-600 px-4 py-1 rounded-full text-[10px] font-black uppercase mb-2">● System Online</div>
                <h2 class="text-slate-800 text-xl font-bold">Presensi Pengerja</h2>
            </div>
            <div class="space-y-6">
                <div class="space-y-2 text-left">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Pilih Nama Anda</label>
                    <select id="user-select" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold text-slate-700 outline-none focus:border-blue-500 appearance-none"></select>
                </div>
                <button onclick="prosesAbsen()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-blue-200 shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-fingerprint text-xl"></i> KIRIM ABSEN SEKARANG
                </button>
            </div>
            <div id="gps-box" class="hidden bg-slate-50 border border-slate-100 rounded-2xl p-4 flex items-center gap-4 text-left">
                <div class="bg-blue-100 p-3 rounded-xl text-blue-600"><i class="fas fa-location-arrow"></i></div>
                <div class="text-[10px]">
                    <p class="font-bold text-slate-500 uppercase">Status Lokasi</p>
                    <p id="coords" class="text-slate-400 italic font-mono uppercase">Mencari koordinat...</p>
                </div>
            </div>
        </div>
    </main>
    <script>
        const data = JSON.parse(localStorage.getItem('pekerja')) || ['Dedi (Welder)', 'Sopian (Field)'];
        const select = document.getElementById('user-select');
        select.innerHTML = data.map(n => `<option value="${n}">${n}</option>`).join('');

        async function prosesAbsen() {
            const box = document.getElementById('gps-box');
            box.classList.remove('hidden');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lok = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                    document.getElementById('coords').innerText = lok;
                    try {
                        const res = await fetch('https://absensi.chenpapoi.workers.dev/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ nama: select.value, lokasi: lok })
                        });
                        if (res.ok) alert('ABSEN BERHASIL DISIMPAN!');
                    } catch (e) { alert('Koneksi Gagal!'); }
                });
            }
        }
    </script>
</body>
</html>

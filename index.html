<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Pekerja</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center border-t-8 border-blue-600">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Sistem Absensi Pekerja 🏗️</h1>
        <p class="text-green-600 font-semibold mb-6">● SISTEM ONLINE</p>
        
        <div id="app" class="space-y-4">
            <p class="text-slate-600 text-sm text-left bg-slate-50 p-3 rounded-lg border border-slate-200">
                Halo, <strong>chenpapoi-arch</strong>!<br>
                Gunakan tombol di bawah untuk absen di lokasi proyek Jakarta Barat/Tangerang.
            </p>
            
            <button onclick="ambilLokasi()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition">
                Mulai Absen Sekarang
            </button>
            
            <div id="hasil" class="hidden mt-4 p-3 bg-blue-50 text-blue-800 text-xs rounded-lg border border-blue-200 italic">
                Mencari lokasi...
            </div>
        </div>
        
        <p class="mt-8 text-[10px] text-slate-400 uppercase tracking-widest">© 2026 AST Services Center</p>
    </div>

    <script>
        function ambilLokasi() {
            const hasil = document.getElementById('hasil');
            hasil.classList.remove('hidden');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    hasil.innerHTML = `Lokasi Terdeteksi: <br> Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`;
                    alert('Absen Berhasil! Lokasi terdata di Jakarta Barat/Tangerang.');
                }, () => {
                    hasil.innerHTML = "Gagal mengambil lokasi. Pastikan GPS aktif.";
                });
            } else {
                hasil.innerHTML = "Browser tidak mendukung GPS.";
            }
        }
    </script>
</body>
</html>
